<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebartan</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.2rem;
            opacity: 0.7;
            letter-spacing: 2px;
        }
        .line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            margin: 1.5rem auto;
        }
        .footer {
            position: fixed;
            bottom: 1.5rem;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.4;
            letter-spacing: 1px;
        }
        .footer a {
            color: #667eea;
            text-decoration: none;
            margin: 0 0.3rem;
        }
        .footer a:hover {
            opacity: 1;
        }
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="container">
        <h1>ERAY BARTAN</h1>
        <div class="line"></div>
        <p>AI Agent Developer</p>
        <p style="margin-top:0.8rem; font-size:0.85rem; opacity:0.5;">RAG ✦ Vector DB ✦ LLM ✦ Agentic AI</p>
        <p style="margin-top:0.4rem; font-size:0.75rem; opacity:0.35;">Hermes ✦ OpenClaw ✦ Paperclip ✦ Letta</p>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const nodeCount = 120;
        const connectionDistance = 2.5;
        const nodes = [];
        const techLabels = ["openrouter", "neo4j", "claude", "docker", "qdrant", "pinecone", "MCP"];
        const labelSprites = [];
        const nodeGeometry = new THREE.BufferGeometry();
        const nodePositions = new Float32Array(nodeCount * 3);

        for (let i = 0; i < nodeCount; i++) {
            nodes.push({
                x: (Math.random() - 0.5) * 14,
                y: (Math.random() - 0.5) * 10,
                z: (Math.random() - 0.5) * 8,
                vx: (Math.random() - 0.5) * 0.003,
                vy: (Math.random() - 0.5) * 0.003,
                vz: (Math.random() - 0.5) * 0.003
            });
            nodePositions[i * 3] = nodes[i].x;
            nodePositions[i * 3 + 1] = nodes[i].y;
            nodePositions[i * 3 + 2] = nodes[i].z;
        }

        nodeGeometry.setAttribute('position', new THREE.BufferAttribute(nodePositions, 3));

        const nodeMaterial = new THREE.PointsMaterial({
            size: 0.06,
            color: 0x667eea,
            transparent: true,
            opacity: 0.9,
            sizeAttenuation: true
        });

        const nodePoints = new THREE.Points(nodeGeometry, nodeMaterial);
        scene.add(nodePoints);

        const lineMaterial = new THREE.LineBasicMaterial({
            color: 0x667eea,
            transparent: true,
            opacity: 0.15,
            linewidth: 1
        });

        const maxLines = 800;
        const lineGeometry = new THREE.BufferGeometry();
        const linePositions = new Float32Array(maxLines * 6);
        lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
        const lines = new THREE.LineSegments(lineGeometry, lineMaterial);
        scene.add(lines);

        camera.position.z = 7;

        function createTextSprite(text) {
            const canvas2d = document.createElement('canvas');
            const ctx = canvas2d.getContext('2d');
            canvas2d.width = 256;
            canvas2d.height = 64;
            ctx.font = 'bold 28px monospace';
            ctx.fillStyle = '#667eea';
            ctx.textAlign = 'center';
            ctx.fillText(text, 128, 40);
            const texture = new THREE.CanvasTexture(canvas2d);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 1 });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(1.5, 0.4, 1);
            return sprite;
        }

        for (let i = 0; i < techLabels.length; i++) {
            const idx = Math.floor(Math.random() * nodeCount);
            const sprite = createTextSprite(techLabels[i]);
            sprite.userData = { nodeIdx: idx, opacity: 1, phase: 'in', timer: Math.random() * 200 + 100 };
            scene.add(sprite);
            labelSprites.push(sprite);
        }

        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);

            let lineIndex = 0;
            const lp = lines.geometry.attributes.position.array;

            for (let i = 0; i < nodeCount; i++) {
                nodes[i].x += nodes[i].vx;
                nodes[i].y += nodes[i].vy;
                nodes[i].z += nodes[i].vz;

                if (Math.abs(nodes[i].x) > 7) nodes[i].vx *= -1;
                if (Math.abs(nodes[i].y) > 5) nodes[i].vy *= -1;
                if (Math.abs(nodes[i].z) > 4) nodes[i].vz *= -1;

                nodePositions[i * 3] = nodes[i].x;
                nodePositions[i * 3 + 1] = nodes[i].y;
                nodePositions[i * 3 + 2] = nodes[i].z;

                for (let j = i + 1; j < nodeCount; j++) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    const dz = nodes[i].z - nodes[j].z;
                    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

                    if (dist < connectionDistance && lineIndex < maxLines) {
                        const idx = lineIndex * 6;
                        lp[idx] = nodes[i].x;
                        lp[idx + 1] = nodes[i].y;
                        lp[idx + 2] = nodes[i].z;
                        lp[idx + 3] = nodes[j].x;
                        lp[idx + 4] = nodes[j].y;
                        lp[idx + 5] = nodes[j].z;
                        lineIndex++;
                    }
                }
            }

            for (let i = lineIndex * 6; i < maxLines * 6; i++) lp[i] = 0;

            nodePoints.geometry.attributes.position.needsUpdate = true;
            lines.geometry.attributes.position.needsUpdate = true;
            lines.geometry.setDrawRange(0, lineIndex * 2);

            for (let i = 0; i < labelSprites.length; i++) {
                const s = labelSprites[i];
                const n = nodes[s.userData.nodeIdx];
                s.position.set(n.x, n.y + 0.3, n.z);

                s.userData.timer--;
                if (s.userData.phase === 'in') {
                    s.userData.opacity = Math.min(s.userData.opacity + 0.015, 1);
                    if (s.userData.timer <= 0) s.userData.phase = 'out';
                } else {
                    s.userData.opacity -= 0.008;
                    if (s.userData.opacity <= 0) {
                        s.userData.nodeIdx = Math.floor(Math.random() * nodeCount);
                        s.userData.opacity = 0;
                        s.userData.phase = 'in';
                        s.userData.timer = Math.random() * 200 + 150;
                    }
                }
                s.material.opacity = s.userData.opacity;
            }

            scene.rotation.y += 0.0005;
            scene.rotation.x = mouseY * 0.1;
            scene.rotation.y += mouseX * 0.001;

            renderer.render(scene, camera);
        }
        animate();
    </script>
    <div class="footer">
        <a href="https://github.com/ebartan">GitHub</a> ✦
        <a href="https://twitter.com/ebartan">Twitter</a> ✦
        Built with <a href="https://nousresearch.com">Hermes Agent</a>
    </div>
</body>
</html>
