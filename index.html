<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebartan</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            color: #c4b5fd;
            text-shadow:
                0 0 10px rgba(167, 139, 250, 0.8),
                0 0 30px rgba(139, 156, 247, 0.6),
                0 0 60px rgba(102, 126, 234, 0.4),
                0 0 100px rgba(102, 126, 234, 0.2);
        }
        p {
            font-size: 1.2rem;
            opacity: 0.85;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }
        .subtitle {
            margin-top: 0.8rem;
            font-size: 0.95rem;
            opacity: 0.6;
            text-shadow: 0 0 15px rgba(102, 126, 234, 0.4);
        }
        .frameworks {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            opacity: 0.4;
            text-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }
        .line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            margin: 1.5rem auto;
        }
        .footer {
            position: fixed;
            bottom: 1.5rem;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.4;
            letter-spacing: 1px;
        }
        .footer a {
            color: #667eea;
            text-decoration: none;
            margin: 0 0.3rem;
        }
        .footer a:hover {
            opacity: 1;
        }
        .subscribe-section {
            position: fixed;
            bottom: 4rem;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
        }
        .subscribe-form {
            display: inline-flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .subscribe-form input {
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.3);
            color: #a8d8ea;
            padding: 0.6rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            outline: none;
            font-family: 'monospace';
            transition: border-color 0.3s;
            width: 260px;
        }
        .subscribe-form input::placeholder {
            color: rgba(168, 216, 234, 0.4);
        }
        .subscribe-form input:focus {
            border-color: rgba(102, 126, 234, 0.7);
        }
        .subscribe-form button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: #fff;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: 'monospace';
            transition: opacity 0.3s;
        }
        .subscribe-form button:hover {
            opacity: 0.85;
        }
        .subscribe-msg {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            opacity: 0;
            transition: opacity 0.3s;
            color: #76ff03;
        }
        .subscribe-msg.error {
            color: #ff4081;
        }
        .subscribe-msg.show {
            opacity: 0.7;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 12, 41, 0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: linear-gradient(135deg, #1a1640, #302b63);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 16px;
            padding: 2.5rem 3rem;
            text-align: center;
            animation: modalIn 0.4s ease;
            box-shadow: 0 0 60px rgba(102, 126, 234, 0.2);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .modal h2 {
            color: #76ff03;
            font-weight: 300;
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }
        .modal p {
            color: #a8d8ea;
            opacity: 0.6;
            font-size: 0.9rem;
        }
        .modal-close {
            margin-top: 1.5rem;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            color: #a8d8ea;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .modal-close:hover {
            background: rgba(102, 126, 234, 0.4);
        }
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="container">
        <h1>ERAY BARTAN</h1>
        <div class="line"></div>
        <p>AI Agent Developer</p>
        <p class="subtitle">RAG ✦ Vector DB ✦ LLM ✦ Agentic AI</p>
        <p class="frameworks">Hermes ✦ OpenClaw ✦ Paperclip ✦ Letta</p>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // === BACKGROUND STARS ===
        const starCount = 600;
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount * 3; i++) starPos[i] = (Math.random() - 0.5) * 80;
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ size: 0.05, color: 0xffffff, transparent: true, opacity: 0.4, sizeAttenuation: true });
        scene.add(new THREE.Points(starGeo, starMat));

        // === NETWORK NODES ===
        const nodeCount = 100;
        const connectionDistance = 2.8;
        const nodes = [];
        const techLabels = ["openrouter", "neo4j", "claude", "docker", "qdrant", "pinecone", "MCP", "openclaw", "paperclip", "hermes", "langchain", "cloudflare", "chatbot", "hasura", "neon", "mongodb", "airtable", "softr", "zoho", "resend", "agent", "skills", "tools", "EXA", "Tavily", "Firecrawl", "Apify", "Firebase", "opencode", "antigravity", "railway", "n8n"];
        const labelSprites = [];
        const nodeGeo = new THREE.BufferGeometry();
        const nodePos = new Float32Array(nodeCount * 3);
        const nodeColors = new Float32Array(nodeCount * 3);

        for (let i = 0; i < nodeCount; i++) {
            nodes.push({
                x: (Math.random() - 0.5) * 16,
                y: (Math.random() - 0.5) * 10,
                z: (Math.random() - 0.5) * 10,
                vx: (Math.random() - 0.5) * 0.002,
                vy: (Math.random() - 0.5) * 0.002,
                vz: (Math.random() - 0.5) * 0.002,
                pulse: Math.random() * Math.PI * 2
            });
            nodePos[i * 3] = nodes[i].x;
            nodePos[i * 3 + 1] = nodes[i].y;
            nodePos[i * 3 + 2] = nodes[i].z;
            const c = new THREE.Color().setHSL(0.68 + Math.random() * 0.08, 0.7, 0.65);
            nodeColors[i * 3] = c.r;
            nodeColors[i * 3 + 1] = c.g;
            nodeColors[i * 3 + 2] = c.b;
        }

        nodeGeo.setAttribute('position', new THREE.BufferAttribute(nodePos, 3));
        nodeGeo.setAttribute('color', new THREE.BufferAttribute(nodeColors, 3));

        const nodeMat = new THREE.PointsMaterial({
            size: 0.1,
            vertexColors: true,
            transparent: true,
            opacity: 1,
            sizeAttenuation: true
        });
        scene.add(new THREE.Points(nodeGeo, nodeMat));

        // Glow layer
        const glowGeo = new THREE.BufferGeometry();
        glowGeo.setAttribute('position', new THREE.BufferAttribute(nodePos.slice(), 3));
        const glowMat = new THREE.PointsMaterial({
            size: 0.4,
            color: 0x667eea,
            transparent: true,
            opacity: 0.08,
            sizeAttenuation: true
        });
        const glowPts = new THREE.Points(glowGeo, glowMat);
        scene.add(glowPts);

        // === CONNECTION LINES ===
        const maxLines = 1000;
        const lineGeo = new THREE.BufferGeometry();
        const linePos = new Float32Array(maxLines * 6);
        const lineCol = new Float32Array(maxLines * 6);
        lineGeo.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
        lineGeo.setAttribute('color', new THREE.BufferAttribute(lineCol, 3));
        const lineMat = new THREE.LineBasicMaterial({
            vertexColors: true,
            transparent: true,
            opacity: 0.6,
            linewidth: 1
        });
        const lines = new THREE.LineSegments(lineGeo, lineMat);
        scene.add(lines);

        camera.position.z = 8;

        // === TECH LABELS ===
        function createTextSprite(text) {
            const c = document.createElement('canvas');
            const ctx = c.getContext('2d');
            c.width = 256;
            c.height = 48;
            ctx.font = 'bold 18px monospace';
            ctx.fillStyle = '#a8d8ea';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#667eea';
            ctx.shadowBlur = 8;
            ctx.fillText(text, 128, 32);
            const tex = new THREE.CanvasTexture(c);
            const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 1 });
            const sprite = new THREE.Sprite(mat);
            sprite.scale.set(1.4, 0.26, 1);
            return sprite;
        }

        for (let i = 0; i < techLabels.length; i++) {
            const sprite = createTextSprite(techLabels[i]);
            sprite.userData = {
                nodeIdx: Math.floor(Math.random() * nodeCount),
                opacity: 0,
                phase: 'in',
                timer: Math.random() * 300 + 200
            };
            scene.add(sprite);
            labelSprites.push(sprite);
        }

        // === MOUSE TRACKING ===
        let mouseX = 0, mouseY = 0, mouseWorld = { x: 0, y: 0 };
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
            mouseWorld.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouseWorld.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            let lineIndex = 0;
            const lp = lines.geometry.attributes.position.array;
            const lc = lines.geometry.attributes.color.array;

            for (let i = 0; i < nodeCount; i++) {
                // Pulse effect
                nodes[i].pulse += 0.02;
                const pulseFactor = 1 + Math.sin(nodes[i].pulse) * 0.0005;

                nodes[i].x += nodes[i].vx * pulseFactor;
                nodes[i].y += nodes[i].vy * pulseFactor;
                nodes[i].z += nodes[i].vz;

                if (Math.abs(nodes[i].x) > 8) nodes[i].vx *= -1;
                if (Math.abs(nodes[i].y) > 5) nodes[i].vy *= -1;
                if (Math.abs(nodes[i].z) > 5) nodes[i].vz *= -1;

                nodePos[i * 3] = nodes[i].x;
                nodePos[i * 3 + 1] = nodes[i].y;
                nodePos[i * 3 + 2] = nodes[i].z;

                for (let j = i + 1; j < nodeCount; j++) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    const dz = nodes[i].z - nodes[j].z;
                    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

                    if (dist < connectionDistance && lineIndex < maxLines) {
                        const idx = lineIndex * 6;
                        const alpha = 1 - (dist / connectionDistance);
                        lp[idx] = nodes[i].x;
                        lp[idx + 1] = nodes[i].y;
                        lp[idx + 2] = nodes[i].z;
                        lp[idx + 3] = nodes[j].x;
                        lp[idx + 4] = nodes[j].y;
                        lp[idx + 5] = nodes[j].z;
                        // Distance-based color intensity
                        lc[idx] = 0.4 * alpha;
                        lc[idx + 1] = 0.49 * alpha;
                        lc[idx + 2] = 0.92 * alpha;
                        lc[idx + 3] = 0.4 * alpha;
                        lc[idx + 4] = 0.49 * alpha;
                        lc[idx + 5] = 0.92 * alpha;
                        lineIndex++;
                    }
                }
            }

            for (let i = lineIndex * 6; i < maxLines * 6; i++) { lp[i] = 0; lc[i] = 0; }

            nodeGeo.attributes.position.needsUpdate = true;
            glowGeo.attributes.position.needsUpdate = true;
            lineGeo.attributes.position.needsUpdate = true;
            lineGeo.attributes.color.needsUpdate = true;
            lineGeo.setDrawRange(0, lineIndex * 2);

            // Labels
            for (let i = 0; i < labelSprites.length; i++) {
                const s = labelSprites[i];
                const n = nodes[s.userData.nodeIdx];
                s.position.set(n.x, n.y + 0.35, n.z);

                s.userData.timer--;
                if (s.userData.phase === 'in') {
                    s.userData.opacity = Math.min(s.userData.opacity + 0.01, 0.85);
                    if (s.userData.timer <= 0) s.userData.phase = 'out';
                } else {
                    s.userData.opacity -= 0.005;
                    if (s.userData.opacity <= 0) {
                        s.userData.nodeIdx = Math.floor(Math.random() * nodeCount);
                        s.userData.opacity = 0;
                        s.userData.phase = 'in';
                        s.userData.timer = Math.random() * 400 + 200;
                    }
                }
                s.material.opacity = s.userData.opacity;
            }

            // Slow rotation + mouse parallax
            scene.rotation.y = Math.sin(time * 0.3) * 0.08 + mouseX * 0.08;
            scene.rotation.x = Math.sin(time * 0.2) * 0.03 + mouseY * 0.06;

            renderer.render(scene, camera);
        }
        animate();

        // === SUBSCRIBE FORM ===
        const form = document.getElementById('subscribeForm');
        const msg = document.getElementById('subscribeMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(form);
            const btn = form.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Gönderiliyor...';

            try {
                const res = await fetch('https://ebartan-temp.vercel.app/api/subscribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: fd.get('email') })
                });
                const data = await res.json();

                if (res.ok) {
                    document.getElementById('successModal').classList.add('active');
                    form.reset();
                } else {
                    msg.textContent = '✗ ' + (data.error || 'Bir hata oluştu');
                    msg.className = 'subscribe-msg error show';
                }
            } catch {
                msg.textContent = '✗ Bağlantı hatası';
                msg.className = 'subscribe-msg error show';
            }

            btn.disabled = false;
            btn.textContent = 'Subscribe ✦';
            setTimeout(() => { msg.className = 'subscribe-msg'; }, 3000);
        });
    </script>
    <div class="modal-overlay" id="successModal">
        <div class="modal">
            <div class="modal-icon">✓</div>
            <h2>BAŞARILI</h2>
            <p>Email listesine eklendin</p>
            <button class="modal-close" onclick="document.getElementById('successModal').classList.remove('active')">Kapat</button>
        </div>
    </div>

    <div class="subscribe-section">
        <form class="subscribe-form" id="subscribeForm">
            <input type="email" name="email" placeholder="email@example.com" required>
            <button type="submit">Subscribe ✦</button>
        </form>
        <div class="subscribe-msg" id="subscribeMsg"></div>
    </div>
    <div class="footer">
        <a href="https://github.com/ebartan">GitHub</a> ✦
        <a href="https://twitter.com/ebartan">Twitter</a> ✦
        Built with <a href="https://nousresearch.com">Hermes Agent</a>
    </div>
</body>
</html>
